 "Check host firewall logs."}], "answer": ["A"]}, {"id": "part2-196", "number": 196, "excelRow": 197, "type": "single", "question": "Which of the following is a reason environmental variables are a concern when reviewing potential system vulnerabilities?", "options": [{"letter": "A", "text": "The contents of environmental variables could affect the scope and impact of an exploited vulnerability."}, {"letter": "B", "text": "In-memory environmental variable values can be overwritten and used by attackers to insert malicious code."}, {"letter": "C", "text": "Environmental variables define cryptographic standards for the system and could create vulnerabilities if deprecated algorithms are used."}, {"letter": "D", "text": "Environmental variables will determine when updates are run and could mitigate the likelihood of vulnerability exploitation."}], "answer": ["A"]}, {"id": "part2-197", "number": 197, "excelRow": 198, "type": "single", "question": "A company evaluates several options that would allow employees to have remote access to the network. The security team wants to ensure the solution includes AAA to comply with internal security policies. Which of the following should the security team recommend?", "options": [{"letter": "A", "text": "IPsec with RADIUS"}, {"letter": "B", "text": "RDP connection with LDAPS"}, {"letter": "C", "text": "Web proxy for all remote traffic"}, {"letter": "D", "text": "Jump server with 802.1X"}], "answer": ["A"]}, {"id": "part2-198", "number": 198, "excelRow": 199, "type": "single", "question": "An administrator must replace an expired SSL certificate. Which of the following does the administrator need to create the new SSL certificate?", "options": [{"letter": "A", "text": "CSR"}, {"letter": "B", "text": "OCSP"}, {"letter": "C", "text": "Key"}, {"letter": "D", "text": "CRL"}], "answer": ["A"]}, {"id": "part2-199", "number": 199, "excelRow": 200, "type": "single", "question": "A systems administrator receives a text message from an unknown number claiming to be the Chief Executive Officer of the company. The message states an emergency situation requires a password reset. Which of the following threat vectors is being used?", "options": [{"letter": "A", "text": "Typosquatting"}, {"letter": "B", "text": "Smishing"}, {"letter": "C", "text": "Pretexting"}, {"letter": "D", "text": "Impersonation"}], "answer": ["B"]}, {"id": "part2-200", "number": 200, "excelRow": 201, "type": "single", "question": "A Chief Information Security Officer (CISO) wants to:-Prevent employees from downloading malicious content.-Establish controls based on departments and users.-Map internet access for business applications to specific service accounts.-Restrict content based on categorization.\nWhich of the following should the CSO implement?", "options": [{"letter": "A", "text": "Web application firewall"}, {"letter": "B", "text": "Secure DNS server"}, {"letter": "C", "text": "Jump server"}, {"letter": "D", "text": "Next-generation firewall"}], "answer": ["D"]}, {"id": "part2-201", "number": 201, "excelRow": 202, "type": "single", "question": "A company is aware of a given security risk related to a specific market segment. The business chooses not to accept responsibility and target their services to a different market segment. Which of the following describes this risk management strategy?", "options": [{"letter": "A", "text": "Exemption"}, {"letter": "B", "text": "Exception"}, {"letter": "C", "text": "Avoid"}, {"letter": "D", "text": "Transfer"}], "answer": ["C"]}, {"id": "part2-202", "number": 202, "excelRow": 203, "type": "multiple", "question": "A security analyst needs to improve the company's authentication policy following a password audit. Which of the following should be included in the policy? (Choose two.)", "options": [{"letter": "A", "text": "Length"}, {"letter": "B", "text": "Complexity"}, {"letter": "C", "text": "Least privilege"}, {"letter": "D", "text": "Something you have"}, {"letter": "E", "text": "Security keys"}, {"letter": "F", "text": "Biometrics"}], "answer": ["A"]}, {"id": "part2-203", "number": 203, "excelRow": 204, "type": "single", "question": "Which of the following is an example of a treatment strategy for a continuous risk?", "options": [{"letter": "A", "text": "Email gateway to block phishing attempts"}, {"letter": "B", "text": "Background checks for new employees"}, {"letter": "C", "text": "Dual control requirements for wire transfers"}, {"letter": "D", "text": "Branch protection as part of the CI/CD pipeline"}], "answer": ["A"]}, {"id": "part2-204", "number": 204, "excelRow": 205, "type": "single", "question": "An organization wants to deploy software in a container environment to increase security. Which of the following would limit the organization's ability to achieve this goal?", "options": [{"letter": "A", "text": "Regulatory compliance"}, {"letter": "B", "text": "Patch availability"}, {"letter": "C", "text": "Kernel version"}, {"letter": "D", "text": "Monolithic code"}], "answer": ["D"]}, {"id": "part2-205", "number": 205, "excelRow": 206, "type": "single", "question": "Prior to implementing a design change, the change must go through multiple steps to ensure that it does not cause any security issues. Which of the following is most likely to be one of those steps?", "options": [{"letter": "A", "text": "Board review"}, {"letter": "B", "text": "Service restart"}, {"letter": "C", "text": "Backout planning"}, {"letter": "D", "text": "Maintenance"}], "answer": ["C"]}, {"id": "part2-206", "number": 206, "excelRow": 207, "type": "single", "question": "The internal audit team determines a software application is no longer in scope for external reporting requirements. Which of the following will confirm that the application is no longer applicable?", "options": [{"letter": "A", "text": "Data inventory and retention"}, {"letter": "B", "text": "Right to be forgotten"}, {"letter": "C", "text": "Due care and due diligence"}, {"letter": "D", "text": "Acknowledgement and attestation"}], "answer": ["A"]}, {"id": "part2-207", "number": 207, "excelRow": 208, "type": "multiple", "question": "Which of the following are the first steps an analyst should perform when developing a heatmap? (Choose two.)", "options": [{"letter": "A", "text": "Methodically walk around the office noting Wi-Fi signal strength."}, {"letter": "B", "text": "Log in to each access point and check the settings."}, {"letter": "C", "text": "Create or obtain a layout of the office."}, {"letter": "D", "text": "Measure cable lengths between access points."}, {"letter": "E", "text": "Review access logs to determine the most active devices."}, {"letter": "F", "text": "Remove possible impediments to radio transmissions."}], "answer": ["A", "C"]}, {"id": "part2-208", "number": 208, "excelRow": 209, "type": "single", "question": "Which of the following is used to improve security and overall functionality without losing critical application data?", "options": [{"letter": "A", "text": "Reformatting"}, {"letter": "B", "text": "Decommissioning"}, {"letter": "C", "text": "Patching"}, {"letter": "D", "text": "Encryption"}], "answer": ["C"]}, {"id": "part2-209", "number": 209, "excelRow": 210, "type": "single", "question": "An organization is preparing to export proprietary software to a customer. Which of the following would be the best way to prevent the loss of intellectual property?", "options": [{"letter": "A", "text": "Codesigning"}, {"letter": "B", "text": "Obfuscation"}, {"letter": "C", "text": "Tokenization"}, {"letter": "D", "text": "Blockchain"}], "answer": ["B"]}, {"id": "part2-210", "number": 210, "excelRow": 211, "type": "single", "question": "Which of the following is the stage in an investigation when forensic images are obtained?", "options": [{"letter": "A", "text": "Acquisition"}, {"letter": "B", "text": "Preservation"}, {"letter": "C", "text": "Reporting"}, {"letter": "D", "text": "E-discovery"}], "answer": ["A"]}, {"id": "part2-211", "number": 211, e failure"}, {"letter": "D", "text": "RFID keylogger"}], "answer": ["B"]}, {"id": "part2-220", "number": 220, "excelRow": 221, "type": "single", "question": "Which of the following could potentially be introduced at the time of side loading?", "options": [{"letter": "A", "text": "User impersonation"}, {"letter": "B", "text": "Rootkit"}, {"letter": "C", "text": "On-path attack"}, {"letter": "D", "text": "Buffer overflow"}], "answer": ["B"]}, {"id": "part2-221", "number": 221, "excelRow": 222, "type": "single", "question": "While a school district is performing state testing, a security analyst notices all internet services are unavailable. The analyst discovers that ARP poisoning is occurring on the network and then terminates access for the host. Which of the following is most likely responsible for this malicious activity?", "options": [{"letter": "A", "text": "Unskilled attacker"}, {"letter": "B", "text": "Shadow IT"}, {"letter": "C", "text": "Insider threat"}, {"letter": "D", "text": "Nation-state"}], "answer": ["C"]}, {"id": "part2-222", "number": 222, "excelRow": 223, "type": "single", "question": "A user needs to complete training at https://securitvtraining.com. After manually entering the URL, the user sees that the accessed website is noticeably different from the standard company website. Which of the following is the most likely explanation for the difference?", "options": [{"letter": "A", "text": "Cross-site scripting"}, {"letter": "B", "text": "Pretexting"}, {"letter": "C", "text": "Typosquatting"}, {"letter": "D", "text": "Vishing"}], "answer": ["C"]}, {"id": "part2-223", "number": 223, "excelRow": 224, "type": "single", "question": "A company has yearly engagements with a service provider. The general terms and conditions are the same for all engagements. The company wants to simplify the process and revisit the general terms every three years. Which of the following documents would provide the best way to set the general terms?", "options": [{"letter": "A", "text": "MSA"}, {"letter": "B", "text": "NDA"}, {"letter": "C", "text": "MOU"}, {"letter": "D", "text": "SLA"}], "answer": ["A"]}, {"id": "part2-224", "number": 224, "excelRow": 225, "type": "single", "question": "While updating the security awareness training, a security analyst wants to address issues created if vendors' email accounts are compromised. Which of the following recommendations should the security analyst include in the training?", "options": [{"letter": "A", "text": "Refrain from clicking on images included in emails from new vendors"}, {"letter": "B", "text": "Delete emails from unknown service provider partners."}, {"letter": "C", "text": "Require that invoices be sent as attachments"}, {"letter": "D", "text": "Be alert to unexpected requests from familiar email addresses"}], "answer": ["D"]}, {"id": "part2-225", "number": 225, "excelRow": 226, "type": "multiple", "question": "A new corporate policy requires all staff to use multifactor authentication to access company resources. Which of the following can be utilized to set up this form of identity and access management? (Choose two.)", "options": [{"letter": "A", "text": "Authentication tokens"}, {"letter": "B", "text": "Least privilege"}, {"letter": "C", "text": "Biometrics"}, {"letter": "D", "text": "LDAP"}, {"letter": "E", "text": "Password vaulting"}, {"letter": "F", "text": "SAML"}], "answer": ["A", "C"]}, {"id": "part2-226", "number": 226, "excelRow": 227, "type": "single", "question": "A help desk employee receives a call from someone impersonating the Chief Executive Officer. The caller asks for assistance with resetting a password. Which of the following best describes this event?", "options": [{"letter": "A", "text": "Vishing"}, {"letter": "B", "text": "Hacktivism"}, {"letter": "C", "text": "Blackmail"}, {"letter": "D", "text": "Misinformation"}], "answer": ["A"]}, {"id": "part2-227", "number": 227, "excelRow": 228, "type": "single", "question": "The number of tickets the help desk has been receiving has increased recently due to numerous false-positive phishing reports. Which of the following would be best to help to reduce the false positives?", "options": [{"letter": "A", "text": "Performing more phishing simulation campaigns"}, {"letter": "B", "text": "Improving security awareness training"}, {"letter": "C", "text": "Hiring more help desk staff"}, {"letter": "D", "text": "Implementing an incident reporting web page"}], "answer": ["B"]}, {"id": "part2-228", "number": 228, "excelRow": 229, "type": "single", "question": "A security report shows that during a two-week test period 80% of employees unwittingly disclosed their SSO credentials when accessing an external website. The organization purposely created the website to simulate a cost-free password complexity test. Which of the following would best help reduce the number of visits to similar websites in the future?", "options": [{"letter": "A", "text": "Block all outbound traffic from the intranet."}, {"letter": "B", "text": "Introduce a campaign to recognize phishing attempts"}, {"letter": "C", "text": "Restrict internet access for the employees who disclosed credentials"}, {"letter": "D", "text": "Implement a deny list of websites"}], "answer": ["B"]}, {"id": "part2-229", "number": 229, "excelRow": 230, "type": "single", "question": "A company is changing its mobile device policy. The company has the following requirements:-Company-owned devices-Ability to harden the devices-Reduced security risk-Compatibility with company resources\nWhich of the following would best meet these requirements?", "options": [{"letter": "A", "text": "BYOD"}, {"letter": "B", "text": "CYOD"}, {"letter": "C", "text": "COPE"}, {"letter": "D", "text": "COBO"}], "answer": ["C"]}, {"id": "part2-230", "number": 230, "excelRow": 231, "type": "single", "question": "A company is concerned about employees unintentionally introducing malware into the network. The company identified fifty employees who clicked on a l : 234, "excelRow": 235, "type": "single", "question": "Which of the following activities should be performed first to compile a list of vulnerabilities in an environment?", "options": [{"letter": "A", "text": "Automated scanning"}, {"letter": "B", "text": "Penetration testing"}, {"letter": "C", "text": "Threat hunting"}, {"letter": "D", "text": "Log aggregation"}, {"letter": "E", "text": "Adversarial emulation"}], "answer": ["A"]}, {"id": "part2-235", "number": 235, "excelRow": 236, "type": "single", "question": "Which of the following can be used to mitigate attacks from high-risk regions?", "options": [{"letter": "A", "text": "Obfuscation"}, {"letter": "B", "text": "Data sovereignty"}, {"letter": "C", "text": "IP geolocation"}, {"letter": "D", "text": "Encryption"}], "answer": ["C"]}, {"id": "part2-236", "number": 236, "excelRow": 237, "type": "single", "question": "An organization that handles sensitive information wants to protect the information by using a reversible technology. Which of the following best satisfies this requirement?", "options": [{"letter": "A", "text": "Hardware security module"}, {"letter": "B", "text": "Hashing algorithm"}, {"letter": "C", "text": "Tokenization"}, {"letter": "D", "text": "Steganography"}], "answer": ["C"]}, {"id": "part2-237", "number": 237, "excelRow": 238, "type": "single", "question": "After a series of account compromises and credential misuse, a company hires a security manager to develop a security program. Which of the following steps should the security manager take first to increase security awareness?", "options": [{"letter": "A", "text": "Evaluate tools that identify risky behavior and distribute reports on the findings."}, {"letter": "B", "text": "Send quarterly newsletters that explain the importance of password management."}, {"letter": "C", "text": "Develop phishing campaigns and notify the management team of any successes."}, {"letter": "D", "text": "Update policies and handbooks to ensure all employees are informed of the new procedures."}], "answer": ["D"]}], "notes": [{"excelRow": 97, "questionNumber": 96, "message": "Chinese placeholder was translated/contextualized in English."}, {"excelRow": 109, "questionNumber": 108, "message": "Chinese placeholder was translated/contextualized in English."}]}];
    const BLOCK_SIZE = 40;
    function storageGet(key, fallback) {
      try {
        const value = localStorage.getItem(key);
        return value ?? fallback;
      } catch {
        return fallback;
      }
    }
    function storageSet(key, value) {
      try {
        localStorage.setItem(key, value);
      } catch {
        // Some file:// browser contexts block localStorage. The exam still works without persistence.
      }
    }
    function loadSelections() {
      try {
        return JSON.parse(storageGet("securityPlusSelections", "{}")) || {};
      } catch {
        return {};
      }
    }
    const state = {
      partIndex: 0,
      blockIndex: 0,
      showAnswers: false,
      graded: false,
      theme: storageGet("securityPlusTheme", "dark"),
      selections: loadSelections()
    };

    const $ = (id) => document.getElementById(id);
    let headerCompact = false;

    function applyTheme() {
      document.body.dataset.theme = state.theme;
      $("themeToggle").setAttribute("aria-pressed", state.theme === "dark" ? "true" : "false");
      $("themeToggle").setAttribute("aria-label", state.theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
      $("themeToggle").setAttribute("title", state.theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
    }

    function save() {
      storageSet("securityPlusSelections", JSON.stringify(state.selections));
    }

    function renderWithoutMoving() {
      const anchor = [...document.querySelectorAll(".question-card")]
        .find(card => card.getBoundingClientRect().bottom > 76);
      const anchorId = anchor?.id;
      const anchorTop = anchor?.getBoundingClientRect().top;
      render();
      requestAnimationFrame(() => {
        if (anchorId && anchorTop !== undefined) {
          const nextAnchor = document.getElementById(anchorId);
          if (nextAnchor) {
            window.scrollBy(0, nextAnchor.getBoundingClientRect().top - anchorTop);
          }
        }
        updateHeaderCompact();
      });
    }

    function updateHeaderCompact() {
      if (!headerCompact && window.scrollY > 170) headerCompact = true;
      if (headerCompact && window.scrollY < 70) headerCompact = false;
      document.body.classList.toggle("is-scrolled", headerCompact);
    }

    function currentPart() { return DATA[state.partIndex]; }
    function blockCount(part = currentPart()) { return Math.ceil(part.questions.length / BLOCK_SIZE); }
    function currentQuestions() {
      const start = state.blockIndex * BLOCK_SIZE;
      return currentPart().questions.slice(start, start + BLOCK_SIZE);
    }
    function currentBlockRange() {
      const part = currentPart();
      const start = state.blockIndex * BLOCK_SIZE + 1;
      const end = Math.min((state.blockIndex + 1) * BLOCK_SIZE, part.questions.length);
      return `${start}-${end}`;
    }
    function selectedFor(q) { return state.selections[q.id] || []; }
    function isCorrect(q) {
      const selected = [...selectedFor(q)].sort().join("");
      const answer = [...q.answer].sort().join("");
      return selected === answer;
    }

    function renderStats() {
      const part = currentPart();
      const answered = part.questions.filter(q => selectedFor(q).length).length;
      const complete = part.questions.length;
      const gradedQuestions = currentQuestions().filter(q => selectedFor(q).length);
      const score = state.graded ? `${gradedQuestions.filter(isCorrect).length}/${currentQuestions().length}` : "Not graded";
      $("stats").innerHTML = `
        <span class="pill"><strong>${part.questions.length}</strong> questions in ${part.title.replace("SY0-701 ", "")}</span>
        <span class="pill"><strong>${answered}</strong> answered / ${complete}</span>
        <span class="pill"><strong>${score}</strong></span>
      `;
    }

    function goToBlock(blockIndex, keepCompact = false) {
      const nextIndex = Math.max(0, Math.min(blockIndex, blockCount() - 1));
      if (nextIndex === state.blockIndex) return;
      state.blockIndex = nextIndex;
      state.graded = false;
      render();
      const top = keepCompact ? document.querySelector("main").offsetTop - 72 : 0;
      window.scrollTo({ top, behavior: "smooth" });
    }

    function renderTabs() {
      $("partTabs").innerHTML = DATA.map((part, index) => `
        <button class="${index === state.partIndex ? "active" : ""}" data-part="${index}">
          ${part.title.replace("SY0-701 ", "")}
        </button>
      `).join("");
      document.querySelectorAll("[data-part]").forEach(button => {
        button.addEventListener("click", () => {
          state.partIndex = Number(button.dataset.part);
          state.blockIndex = 0;
          state.graded = false;
          render();
        });
      });
    }

    function renderSegments() {
      const part = currentPart();
      const total = blockCount(part);
      $("segments").innerHTML = Array.from({ length: total }, (_, i) => {
        const start = i * BLOCK_SIZE + 1;
        const end = Math.min((i + 1) * BLOCK_SIZE, part.questions.length);
        return `<button class="${i === state.blockIndex ? "active" : ""}" data-block="${i}">${start}-${end}</button>`;
      }).join("");
      document.querySelectorAll("[data-block]").forEach(button => {
        button.addEventListener("click", () => {
          goToBlock(Number(button.dataset.block));
        });
      });
    }

    function optionClass(q, option) {
      if (!(state.graded || state.showAnswers)) return "";
      const isAnswer = q.answer.includes(option.letter);
      const isSelected = selectedFor(q).includes(option.letter);
      if (isAnswer) return "answer";
      if (state.graded && isSelected && !isAnswer) return "wrong";
      return "";
    }

    function renderQuestions() {
      $("questions").innerHTML = currentQuestions().map(q => {
        const selected = selectedFor(q);
        const checked = (letter) => selected.includes(letter) ? "checked" : "";
        const type = q.type === "multiple" ? "checkbox" : "radio";
        const cardClass = state.graded ? (isCorrect(q) ? "correct" : "incorrect") : "";
        const answerText = q.answer.join(", ");
        const typeText = q.type === "multiple" ? `Choose ${q.answer.length}` : "Choose 1";
        return `
          <article class="question-card ${cardClass}" id="${q.id}">
            <div class="q-meta">
              <span class="q-number">Question ${q.number}</span>
              <span class="q-type">${typeText}</span>
            </div>
            <p class="prompt">${escapeHtml(q.question)}</p>
            <div class="options">
              ${q.options.map(option => `
                <label class="option ${optionClass(q, option)}">
                  <input type="${type}" name="${q.id}" value="${option.letter}" ${checked(option.letter)} />
                  <span class="letter">${option.letter}</span>
                  <span>${escapeHtml(option.text)}</span>
                </label>
              `).join("")}
            </div>
            <div class="result ${(state.graded || state.showAnswers) ? "show" : ""}">
              ${state.graded ? (isCorrect(q)
                ? `<strong class="good">Correct.</strong>`
                : `<strong class="bad">Review this one.</strong>`) : ""}
              Correct answer: <strong>${answerText}</strong>
            </div>
          </article>
        `;
      }).join("");

      document.querySelectorAll("input").forEach(input => {
        input.addEventListener("change", () => {
          const qid = input.name;
          const question = currentQuestions().find(q => q.id === qid);
          if (!state.selections[qid]) state.selections[qid] = [];
          if (question.type === "single") {
            state.selections[qid] = [input.value];
          } else {
            const set = new Set(state.selections[qid]);
            input.checked ? set.add(input.value) : set.delete(input.value);
            state.selections[qid] = [...set].sort();
          }
          state.graded = false;
          save();
          renderStats();
        });
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function grade() {
      state.graded = true;
      render();
      const firstMiss = currentQuestions().find(q => !isCorrect(q));
      if (firstMiss) document.getElementById(firstMiss.id).scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function resetBlock() {
      currentQuestions().forEach(q => delete state.selections[q.id]);
      state.graded = false;
      save();
      render();
    }

    function render() {
      renderTabs();
      renderSegments();
      renderQuestions();
      renderStats();
      applyTheme();
      $("toggleAnswers").textContent = state.showAnswers ? "Hide answers" : "Show answers";
      $("prevBlock").disabled = state.blockIndex === 0;
      $("nextBlock").disabled = state.blockIndex >= blockCount() - 1;
      $("compactPrevBlock").disabled = state.blockIndex === 0;
      $("compactNextBlock").disabled = state.blockIndex >= blockCount() - 1;
      $("compactBlockLabel").textContent = currentBlockRange();
      $("compactBarPrevBlock").disabled = state.blockIndex === 0;
      $("compactBarNextBlock").disabled = state.blockIndex >= blockCount() - 1;
      $("compactBarBlockLabel").textContent = currentBlockRange();
      $("compactToggleAnswers").textContent = state.showAnswers ? "Hide answers" : "Show answers";
    }

    $("themeToggle").addEventListener("click", () => {
      state.theme = state.theme === "dark" ? "light" : "dark";
      storageSet("securityPlusTheme", state.theme);
      applyTheme();
    });
    $("gradeTop").addEventListener("click", grade);
    $("gradeBottom").addEventListener("click", grade);
    $("compactGrade").addEventListener("click", grade);
    $("resetBlock").addEventListener("click", resetBlock);
    $("toggleAnswers").addEventListener("click", () => {
      state.showAnswers = !state.showAnswers;
      renderWithoutMoving();
    });
    $("compactToggleAnswers").addEventListener("click", () => {
      state.showAnswers = !state.showAnswers;
      renderWithoutMoving();
    });
    $("prevBlock").addEventListener("click", () => {
      goToBlock(state.blockIndex - 1);
    });
    $("nextBlock").addEventListener("click", () => {
      goToBlock(state.blockIndex + 1);
    });
    $("compactPrevBlock").addEventListener("click", () => {
      goToBlock(state.blockIndex - 1);
    });
    $("compactNextBlock").addEventListener("click", () => {
      goToBlock(state.blockIndex + 1);
    });
    $("compactBarPrevBlock").addEventListener("click", () => {
      goToBlock(state.blockIndex - 1, true);
    });
    $("compactBarNextBlock").addEventListener("click", () => {
      goToBlock(state.blockIndex + 1, true);
    });
    window.addEventListener("scroll", updateHeaderCompact, { passive: true });

    render();
    updateHeaderCompact();
  </script>
</body>
</html>
