putting together a documented plan describing how the organization will keep operating in the event of a global incident. Which of the following plans is the IT manager creating?", "options": [{"letter": "A", "text": "Business continuity"}, {"letter": "B", "text": "Physical security"}, {"letter": "C", "text": "Change management"}, {"letter": "D", "text": "Disaster recovery"}], "answer": ["A"]}, {"id": "part1-189", "number": 189, "excelRow": 190, "type": "single", "question": "A business needs a recovery site but does not require immediate failover. The business also wants to reduce the workload required to recover from an outage. Which of the following recovery sites is the best option?", "options": [{"letter": "A", "text": "Hot"}, {"letter": "B", "text": "Cold"}, {"letter": "C", "text": "Warm"}, {"letter": "D", "text": "Geographically dispersed"}], "answer": ["C"]}, {"id": "part1-190", "number": 190, "excelRow": 191, "type": "single", "question": "A security team is setting up a new environment for hosting the organization's on-premises software application as a cloud-based service. Which of the following should the team ensure is in place in order for the organization to follow security best practices?", "options": [{"letter": "A", "text": "Virtualization and isolation of resources"}, {"letter": "B", "text": "Network segmentation"}, {"letter": "C", "text": "Data encryption"}, {"letter": "D", "text": "Strong authentication policies"}], "answer": ["A"]}, {"id": "part1-191", "number": 191, "excelRow": 192, "type": "single", "question": "A manager receives an email that contains a link to receive a refund. After hovering over the link, the manager notices that the domain's URL points to a suspicious link. Which of the following security practices helped the manager to identify the attack?", "options": [{"letter": "A", "text": "End user training"}, {"letter": "B", "text": "Policy review"}, {"letter": "C", "text": "URL scanning"}, {"letter": "D", "text": "Plain text email"}], "answer": ["A"]}, {"id": "part1-192", "number": 192, "excelRow": 193, "type": "single", "question": "A company wants to verify that the software the company is deploying came from the vendor the company purchased the software from. Which of the following is the best way for the company to confirm this information?", "options": [{"letter": "A", "text": "Validate the code signature."}, {"letter": "B", "text": "Execute the code in a sandbox."}, {"letter": "C", "text": "Search the executable for ASCII strings."}, {"letter": "D", "text": "Generate a hash of the files."}], "answer": ["A"]}, {"id": "part1-193", "number": 193, "excelRow": 194, "type": "single", "question": "A systems administrator notices that one of the systems critical for processing customer transactions is running an end-of-life operating system. Which of the following techniques would increase enterprise security?", "options": [{"letter": "A", "text": "Installing HIDS on the system"}, {"letter": "B", "text": "Placing the system in an isolated VLAN"}, {"letter": "C", "text": "Decommissioning the system"}, {"letter": "D", "text": "Encrypting the system's hard drive"}], "answer": ["B"]}, {"id": "part1-194", "number": 194, "excelRow": 195, "type": "single", "question": "The Chief Information Security Officer (CISO) at a large company would like to gain an understanding of how the company's security policies compare to the requirements imposed by external regulators. Which of the following should the CISO use?", "options": [{"letter": "A", "text": "Penetration test"}, {"letter": "B", "text": "Internal audit"}, {"letter": "C", "text": "Attestation"}, {"letter": "D", "text": "External examination"}], "answer": ["B"]}, {"id": "part1-195", "number": 195, "excelRow": 196, "type": "single", "question": "A systems administrator notices that the research and development department is not using the company VPN when accessing various company-related services and systems. Which of the following scenarios describes this activity?", "options": [{"letter": "A", "text": "Espionage"}, {"letter": "B", "text": "Data exfiltration"}, {"letter": "C", "text": "Nation-state attack"}, {"letter": "D", "text": "Shadow IT"}], "answer": ["D"]}, {"id": "part1-196", "number": 196, "excelRow": 197, "type": "single", "question": "The marketing department set up its own project management software without telling the appropriate departments. Which of the following describes this scenario?", "options": [{"letter": "A", "text": "Shadow IT"}, {"letter": "B", "text": "Insider threat"}, {"letter": "C", "text": "Data exfiltration"}, {"letter": "D", "text": "Service disruption"}], "answer": ["A"]}, {"id": "part1-197", "number": 197, "excelRow": 198, "type": "single", "question": "Which of the following would best explain why a security analyst is running daily vulnerability scans on all corporate endpoints?", "options": [{"letter": "A", "text": "To track the status of patching installations"}, {"letter": "B", "text": "To find shadow IT cloud deployments"}, {"letter": "C", "text": "To continuously the monitor hardware inventory"}, {"letter": "D", "text": "To hunt for active attackers in the network"}], "answer": ["A"]}, {"id": "part1-198", "number": 198, "excelRow": 199, "type": "single", "question": "Which of the following is classified as high availability in a cloud environment?", "options": [{"letter": "A", "text": "Access broker"}, {"letter": "B", "text": "Cloud HSM"}, {"letter": "C", "text": "WAF"}, {"letter": "D", "text": "Load balancer"}], "answer": ["D"]}, {"id": "part1-199", "number": 199, "excelRow": 200, "type": "single", "question": "Which of the following security measures is required when using a cloud-based platform for IoT management?", "options": [{"letter": "A", "text": "Encrypted connection"}, {"letter": "B", "text": "Federated identity"}, {"letter": "C", "text": "Firewall"}, {"letter": "D", "text": "Single sign-on"}], "answer": ["A"]}, {"id": "part1-200", "number": 200, "excelRow": 201, "type": "single", "question": "Which of the following threat vectors is most commonly utilized by insider threat actors attempting data exfiltration?", "options": [{"letter": "A", "text": "Unidentified removable devices"}, {"letter": "B", "text": "Default network device credentials"}, {"letter": "C", "text": "Spear phishing emails"}, {"letter": "D", "text": "Impersonation of business units through typosquatting"}], "answer": ["A"]}, {"id": "part1-201", "number": 201, "excelRow": 202, "type": "single", "question": "Which of the following methods to secure credit card data is best to use when a requirement is to see only the last four numbers on a credit card?", "options": [{"letter": "A", "text": "Encryption"}, {"letter": "B", "text": "Hashing"}, {"letter": "C", "text": "Masking"}, {"letter": "D", "text": "Tokenization"}], "answer": ["C"]}, {"id": "part1-202", "number": 202, "excelRow": 203, "type": "single", "question": "The Chief Information Security Officer (CISO) has determined the company is non-compliant with local data privacy regulations. The CISO needs to justify the budget request for more resources. Which of the following should the CISO present to the board as the direct consequence of non-compliance?", "options": [{"letter": "A", "text": "Fines"}, {"letter": "B", "text": "Reputational damage"}, {"letter": "C", "text": "Sanctions"}, {"letter": "D", "text": "Contractual implications"}], "answer": ["A"]}, {"id": "part1-203", "number": 203, "excelRow": 204, "type": "single", "question": "Which of the following alert types is the most likely to be ignored over time?", "options": [{"letter": "A", "text": "True positive"}, {"letter": "B", "text": "True negative"}, {"letter": "C", "text": "False positive"}, {"letter": "D", "text": "False negative"}], "answer": ["C"]}, {"id": "part1-204", "number": 204, "excelRow": 205, "type": "single", "question": "A security analyst is investigating an application server and discovers that software on the server is behaving abnormally. The software normally runs batch jobs locally and does not generate traffic, but the process is now generating outbound traffic over random high ports. Which of the following vulnerabilities has likely been exploited in this software?", "options": [{"letter": "A", "text": "Memory injection"}, {"letter": "B", "text": "Race condition"}, {"letter": "C", "text": "Side loading"}, {"letter": "D", "text": "SQL injection"}], "answer": ["A"]}, {"id": "part1-205", "number": 205, "excelRow": 206, "type": "single", "question": "An important patch for a critical application has just been released, and a systems administrator is identifying all of the systems requiring the patch. Which of the following must be maintained in order to ensure that all systems requiring the patch are updated?", "options": [{"letter": "A", "text": "Asset inventory"}, {"letter": "B", "text": "Network enumeration"}, {"letter": "C", "text": "Data certification"}, {"letter": "D", "text": "Procurement process"}], "answer": ["A"]}, {"id": "part1-206", "number": 206, "excelRow": 207, "type": "single", "question": "Which of the following should a security operations center use to improve its incident response procedure?", "options": [{"letter": "A", "text": "Playbooks"}, {"letter": "B", "text": "Frameworks"}, {"letter": "C", "text": "Baselines"}, {"letter": "D", "text": "Benchmarks"}], "answer": ["A"]}, {"id": "part1-207", "number": 207, "excelRow": 208, "type": "single", "question": "Which of the following describes an executive team that is meeting in a board room and testing the company's incident response plan?", "options": [{"letter": "A", "text": "Continuity of operations"}, {"letter": "B", "text": "Capacity planning"}, {"letter": "C", "text": "Tabletop exercise"}, {"letter": "D", "text": "Parallel processing"}], "answer": ["C"]}, {"id": "part1-208", "number": 208, "excelRow": 209, "type": "single", "question": "A healthcare organization wants to provide a web application that allows individuals to digitally report health emergencies. Which of the following is the most important consideration during development?", "options": [{"letter": "A", "text": "Scalability"}, {"letter": "B", "text": "Availability"}, {"letter": "C", "text": "Cost"}, {"letter": "D", "text": "Ease of deployment"}], "answer": ["B"]}, {"id": "part1-209", "number": 209, "excelRow": 210, "type": "single", "question": "Which of the following agreement types defines the time frame in which a vendor needs to respond?", "options": [{"letter": "A", "text": "SOW"}, {"letter": "B", "text": "SLA"}, {"letter": "C", "text": "MOA"}, {"letter": "D", "text": "MOU"}], "answer": ["B"]}, {"id": "part1-210", "number": 210, "excelRow": 211, "type": "single", "question": "Which of the following is a feature of a next-generation SIEM system?", "options": [{"letter": "A", "text": "Virus signatures"}, {"letter": "B", "text": "Automated response actions"}, {"letter": "C", "text": "Security agent deployment"}, {"letter": "D", "text": "Vulnerability scanning"}], "answer": ["B"]}, {"id": "part1-211", "number": 211, "excelRow": 212, "type": "multiple", "question": "To improve the security at a data center, a security administrator implements a CCTV system and posts several signs about the possibility of being filmed. Which of the following best describe these types of controls? (Choose two.)", "options": [{"letter": "A", "text": "Preventive"}, {"letter": "B", "text": "Deterrent"}, {"letter": "C", "text": "Corrective"}, {"letter": "D", "text": "Directive"}, {"letter": "E", "text": "Compensating"}, {"letter": "F", "text": "Detective"}], "answer": ["B", "F"]}, {"id": "part1-212", "number": 212, "excelRow": 213, "type": "single", "question": "Which of the following examples would be best mitigated by input sanitization?", "options": [{"letter": "A", "text": "Malicious input submitted to an application field, such as an injection payload (source option text was missing)."}, {"letter": "B", "text": "nmap-10.11.1.130"}, {"letter": "C", "text": "Email message: 'Click this link to get your free gift card.'"}, {"letter": "D", "text": "Browser message: 'Your connection is not private.'"}], "answer": ["A"]}, {"id": "part1-213", "number": 213, "excelRow": 214, "type": "single", "question": "An attacker posing as the Chief Executive Officer calls an employee and instructs the employee to buy gift cards. Which of the following techniques is the attacker using?", "options": [{"letter": "A", "text": "Smishing"}, {"letter": "B", "text": "Disinformation"}, {"letter": "C", "text": "Impersonating"}, {"letter": "D", "text": "Whaling"}], "answer": ["C"]}, {"id": "part1-214", "number": 214, "excelRow": 215, "type": "single", "question": "After conducting a vulnerability scan, a systems administrator notices that one of the identified vulnerabilities is not present on the systems that were scanned. Which of the following describes this example?", "options": [{"letter": "A", "text": "False positive"}, {"letter": "B", "text": "False negative"}, {"letter": "C", "text": "True positive"}, {"letter": "D", "text": "True negative"}], "answer": ["A"]}, {"id": "part1-215", "number": 215, "excelRow": 216, "type": "single", "question": "A recent penetration test identified that an attacker could flood the MAC address table of network switches. Which of the following would best mitigate this type of attack?", "options": [{"letter": "A", "text": "Load balancer"}, {"letter": "B", "text": "Port security"}, {"letter": "C", "text": "IPS"}, {"letter": "D", "text": "NGFW"}], "answer": ["B"]}, {"id": "part1-216", "number": 216, "excelRow": 217, "type": "single", "question": "A user would like to install software and features that are not available with a smartphone's default software. Which of the following would allow the user to install unauthorized software and enable new features?", "options": [{"letter": "A", "text": "SQLi"}, {"letter": "B", "text": "Cross-site scripting"}, {"letter": "C", "text": "Jailbreaking"}, {"letter": "D", "text": "Side loading"}], "answer": ["C"]}, {"id": "part1-217", "number": 217, "excelRow": 218, "type": "single", "question": "Which of the following phases of an incident response involves generating reports?", "options": [{"letter": "A", "text": "Recovery"}, {"letter": "B", "text": "Preparation"}, {"letter": "C", "text": "Lessons learned"}, {"letter": "D", "text": "Containment"}], "answer": ["C"]}, {"id": "part1-218", "number": 218, "excelRow": 219, "type": "single", "question": "Which of the following methods would most likely be used to identify legacy systems?", "options": [{"letter": "A", "text": "Bug bounty program"}, {"letter": "B", "text": "Vulnerability scan"}, {"letter": "C", "text": "Package monitoring"}, {"letter": "D", "text": "Dynamic analysis"}], "answer": ["B"]}, {"id": "part1-219", "number": 219, "excelRow": 220, "type": "single", "question": "Employees located off-site must have access to company resources in order to complete their assigned tasks. These employees utilize a solution that allows remote access without interception concerns. Which of the following best describes this solution?", "options": [{"letter": "A", "text": "Proxy server"}, {"letter": "B", "text": "NGFW"}, {"letter": "C", "text": "VPN"}, {"letter": "D", "text": "Security zone"}], "answer": ["C"]}, {"id": "part1-220", "number": 220, "excelRow": 221, "type": "single", "question": "A company allows customers to upload PDF documents to its public e-commerce website. Which of the following would a security analyst most likely recommend?", "options": [{"letter": "A", "text": "Utilizing attack signatures in an IDS"}, {"letter": "B", "text": "Enabling malware detection through a UTM"}, {"letter": "C", "text": "Limiting the affected servers with a load balancer"}, {"letter": "D", "text": "Blocking command injections via a WAF"}], "answer": ["B"]}, {"id": "part1-221", "number": 221, "excelRow": 222, "type": "single", "question": "A security analyst developed a script to automate a trivial and repeatable task. Which of the following best describes the benefits of ensuring other team members understand how the script works?", "options": [{"letter": "A", "text": "To reduce implementation cost"}, {"letter": "B", "text": "To identify complexity"}, {"letter": "C", "text": "To remediate technical debt"}, {"letter": "D", "text": "To prevent a single point of failure"}], "answer": ["D"]}, {"id": "part1-222", "number": 222, "excelRow": 223, "type": "single", "question": "A company is decommissioning its physical servers and replacing them with an architecture that will reduce the number of individual operating systems. Which of the following strategies should the company use to achieve this security requirement?", "options": [{"letter": "A", "text": "Microservices"}, {"letter": "B", "text": "Containerization"}, {"letter": "C", "text": "Virtualization"}, {"letter": "D", "text": "Infrastructure as code"}], "answer": ["B"]}, {"id": "part1-223", "number": 223, "excelRow": 224, "type": "multiple", "question": "An administrator needs to perform server hardening before deployment. Which of the following steps should the administrator take? (Choose two.)", "options": [{"letter": "A", "text": "Disable default accounts"}, {"letter": "B", "text": "Add the server to the asset inventory."}, {"letter": "C", "text": "Remove unnecessary services."}, {"letter": "D", "text": "Document default passwords."}, {"letter": "E", "text": "Send server logs to the SIEM."}, {"letter": "F", "text": "Join the server to the corporate domain."}], "answer": ["A", "C"]}, {"id": "part1-224", "number": 224, "excelRow": 225, "type": "single", "question": "A Chief Information Security Officer would like to conduct frequent, detailed reviews of systems and procedures to track compliance objectives. Which of the following will be the best method to achieve this objective?", "options": [{"letter": "A", "text": "Third-party attestation"}, {"letter": "B", "text": "Penetration testing"}, {"letter": "C", "text": "Internal auditing"}, {"letter": "D", "text": "Vulnerability scans"}], "answer": ["C"]}, {"id": "part1-225", "number": 225, "excelRow": 226, "type": "single", "question": "Which of the following security concepts is accomplished with the installation of a RADIUS server?", "options": [{"letter": "A", "text": "CIA"}, {"letter": "B", "text": "AAA"}, {"letter": "C", "text": "ACL"}, {"letter": "D", "text": "PEM"}], "answer": ["B"]}, {"id": "part1-226", "number": 226, "excelRow": 227, "type": "single", "question": "After creating a contract for IT contractors, the human resources department changed several clauses. The contract has gone through three revisions. Which of the following processes should the human resources department follow to track revisions?", "options": [{"letter": "A", "text": "Version validation"}, {"letter": "B", "text": "Version changes"}, {"letter": "C", "text": "Version updates"}, {"letter": "D", "text": "Version control"}], "answer": ["D"]}, {"id": "part1-227", "number": 227, "excelRow": 228, "type": "single", "question": "The executive management team is mandating the company develop a disaster recovery plan. The cost must be kept to a minimum, and the money to fund additional internet connections is not available. Which of the following would be the best option?", "options": [{"letter": "A", "text": "Hot site"}, {"letter": "B", "text": "Cold site"}, {"letter": "C", "text": "Failover site"}, {"letter": "D", "text": "Warm site"}], "answer": ["B"]}, {"id": "part1-228", "number": 228, "excelRow": 229, "type": "single", "question": "An administrator at a small business notices an increase in support calls from employees who receive a blocked page message after trying to navigate to a spoofed website. Which of the following should the administrator do?", "options": [{"letter": "A", "text": "Deploy multifactor authentication."}, {"letter": "B", "text": "Decrease the level of the web filter settings."}, {"letter": "C", "text": "Implement security awareness training."}, {"letter": "D", "text": "Update the acceptable use policy."}], "answer": ["C"]}, {"id": "part1-229", "number": 229, "excelRow": 230, "type": "single", "question": "Which of the following teams is best suited to determine whether a company has systems that can be exploited by a potential, identified vulnerability?", "options": [{"letter": "A", "text": "Purple team"}, {"letter": "B", "text": "Blue team"}, {"letter": "C", "text": "Red team"}, {"letter": "D", "text": "White team"}], "answer": ["B"]}, {"id": "part1-230", "number": 230, "excelRow": 231, "type": "single", "question": "A company is reviewing options to enforce user logins after several account takeovers. The following conditions must be met as part of the solution: \n• Allow employees to work remotely or from assigned offices around the world. \n• Provide a seamless login experience. \n• Limit the amount of equipment required. \nWhich of the following best meets these conditions?", "options": [{"letter": "A", "text": "Trusted devices"}, {"letter": "B", "text": "Geotagging"}, {"letter": "C", "text": "Smart cards"}, {"letter": "D", "text": "Time-based logins"}], "answer": ["A"]}, {"id": "part1-231", "number": 231, "excelRow": 232, "type": "multiple", "question": "Which of the following methods can be used to detect attackers who have successfully infiltrated a network? (Choose two.)", "options": [{"letter": "A", "text": "Tokenization"}, {"letter": "B", "text": "CI/CD"}, {"letter": "C", "text": "Honeypots"}, {"letter": "D", "text": "Threat modeling"}, {"letter": "E", "text": "DNS sinkhole"}, {"letter": "F", "text": "Data obfuscation"}], "answer": ["C", "E"]}, {"id": "part1-232", "number": 232, "excelRow": 233, "type": "single", "question": "A company wants to ensure that the software it develops will not be tampered with after the final version is completed. Which of the following should the company most likely use?", "options": [{"letter": "A", "text": "Hashing"}, {"letter": "B", "text": "Encryption"}, {"letter": "C", "text": "Baselines"}, {"letter": "D", "text": "Tokenization"}], "answer": ["A"]}, {"id": "part1-233", "number": 233, "excelRow": 234, "type": "single", "question": "An organization completed a project to deploy SSO across all business applications last year. Recently, the finance department selected a new cloud-based accounting software vendor. Which of the following should most likely be configured during the new software deployment?", "options": [{"letter": "A", "text": "RADIUS"}, {"letter": "B", "text": "SAML"}, {"letter": "C", "text": "EAP"}, {"letter": "D", "text": "OpenID"}], "answer": ["B"]}, {"id": "part1-234", "number": 234, "excelRow": 235, "type": "single", "question": "A user, who is waiting for a flight at an airport, logs in to the airline website using the public Wi-Fi, ignores a security warning and purchases an upgraded seat. When the flight lands, the user finds unauthorized credit card charges. Which of the following attacks most likely occurred?", "options": [{"letter": "A", "text": "Replay attack"}, {"letter": "B", "text": "Memory leak"}, {"letter": "C", "text": "Buffer overflow attack"}, {"letter": "D", "text": "On-path attack"}], "answer": ["D"]}, {"id": "part1-235", "number": 235, "excelRow": 236, "type": "single", "question": "A network engineer deployed a redundant switch stack to increase system availability. However, the budget can only cover the cost of one ISP connection. Which of the following best describes the potential risk factor?", "options": [{"letter": "A", "text": "The equipment MTBF is unknown."}, {"letter": "B", "text": "The ISP has no SLA."}, {"letter": "C", "text": "An RPO has not been determined."}, {"letter": "D", "text": "There is a single point of failure."}], "answer": ["D"]}, {"id": "part1-236", "number": 236, "excelRow": 237, "type": "multiple", "question": "A network team segmented a critical, end-of-life server to a VLAN that can only be reached by specific devices but cannot be reached by the perimeter network. Which of the following best describe the controls the team implemented? (Choose two.)", "options": [{"letter": "A", "text": "Managerial"}, {"letter": "B", "text": "Physical"}, {"letter": "C", "text": "Corrective"}, {"letter": "D", "text": "Detective"}, {"letter": "E", "text": "Compensating"}, {"letter": "F", "text": "Technical"}], "answer": ["E", "F"]}, {"id": "part1-237", "number": 237, "excelRow": 238, "type": "single", "question": "A threat actor was able to use a username and password to log in to a stolen company mobile device. Which of the following provides the best solution to increase mobile data security on all employees' company mobile devices?", "options": [{"letter": "A", "text": "Application management"}, {"letter": "B", "text": "Full disk encryption"}, {"letter": "C", "text": "Remote wipe"}, {"letter": "D", "text": "Containerization"}], "answer": ["B"]}, {"id": "part1-238", "number": 238, "excelRow": 239, "type": "single", "question": "Which of the following best describes the risk present after controls and mitigating factors have been applied?", "options": [{"letter": "A", "text": "Residual"}, {"letter": "B", "text": "Avoided"}, {"letter": "C", "text": "Inherent"}, {"letter": "D", "text": "Operational"}], "answer": ["A"]}, {"id": "part1-239", "number": 239, "excelRow": 240, "type": "single", "question": "A software development team asked a security administrator to recommend techniques that should be used to reduce the chances of the software being reverse engineered. Which of the following should the security administrator recommend?", "options": [{"letter": "A", "text": "Digitally signing the software"}, {"letter": "B", "text": "Performing code obfuscation"}, {"letter": "C", "text": "Limiting the use of third-party libraries"}, {"letter": "D", "text": "Using compile flags"}], "answer": ["B"]}, {"id": "part1-240", "number": 240, "excelRow": 241, "type": "single", "question": "Which of the following is a possible factor for MFA?", "options": [{"letter": "A", "text": "Something you exhibit"}, {"letter": "B", "text": "Something you have"}, {"letter": "C", "text": "Somewhere you are"}, {"letter": "D", "text": "Someone you know"}], "answer": ["B"]}, {"id": "part1-241", "number": 241, "excelRow": 242, "type": "multiple", "question": "Easy-to-guess passwords led to an account compromise. The current password policy requires at least 12 alphanumeric characters, one uppercase character, one lowercase character, a password history of two passwords, a minimum password age of one day, and a maximum password age of 90 days. Which of the following would reduce the risk of this incident from happening again? (Choose two.)", "options": [{"letter": "A", "text": "Increasing the minimum password length to 14 characters."}, {"letter": "B", "text": "Upgrading the password hashing algorithm from MD5 to SHA-512."}, {"letter": "C", "text": "Increasing the maximum password age to 120 days."}, {"letter": "D", "text": "Reducing the minimum password length to ten characters."}, {"letter": "E", "text": "Reducing the minimum password age to zero days."}, {"letter": "F", "text": "Including a requirement for at least one special character."}], "answer": ["A", "F"]}, {"id": "part1-242", "number": 242, "excelRow": 243, "type": "single", "question": "A user downloaded software from an online forum. After the user installed the software, the security team observed external network traffic connecting to the user's computer on an uncommon port. Which of the following is the most likely explanation of this unauthorized connection?", "options": [{"letter": "A", "text": "The software had a hidden keylogger."}, {"letter": "B", "text": "The software was ransomware."}, {"letter": "C", "text": "The user's computer had a fileless virus."}, {"letter": "D", "text": "The software contained a backdoor."}], "answer": ["D"]}, {"id": "part1-243", "number": 243, "excelRow": 244, "type": "single", "question": "A utility company is designing a new platform that will host all the virtual machines used by business applications. The requirements include:\n• A starting baseline of 50% memory utilization\n• Storage scalability\n• Single circuit failure resilience\nWhich of the following best meets all of these requirements?", "options": [{"letter": "A", "text": "Connecting dual PDUs to redundant power supplies"}, {"letter": "B", "text": "Transitioning the platform to an IaaS provider"}, {"letter": "C", "text": "Configuring network load balancing for multiple paths"}, {"letter": "D", "text": "Deploying multiple large NAS devices for each host"}], "answer": ["B"]}, {"id": "part1-244", "number": 244, "excelRow": 245, "type": "single", "question": "Which of the following best describes a use case for a DNS sinkhole?", "options": [{"letter": "A", "text": "Attackers can see a DNS sinkhole as a highly valuable resource to identify a company's domain structure."}, {"letter": "B", "text": "A DNS sinkhole can be used to draw employees away from known-good websites to malicious ones owned by the attacker."}, {"letter": "C", "text": "A DNS sinkhole can be used to capture traffic to known-malicious domains used by attackers."}, {"letter": "D", "text": "A DNS sinkhole can be set up to attract potential attackers away from a company's network resources."}], "answer": ["C"]}, {"id": "part1-245", "number": 245, "excelRow": 246, "type": "single", "question": "An incident analyst finds several image files on a hard disk. The image files may contain geolocation coordinates. Which of the following best describes the type of information the analyst is trying to extract from the image files?", "options": [{"letter": "A", "text": "Log data"}, {"letter": "B", "text": "Metadata"}, {"letter": "C", "text": "Encrypted data"}, {"letter": "D", "text": "Sensitive data"}], "answer": ["B"]}, {"id": "part1-246", "number": 246, "excelRow": 247, "type": "single", "question": "Which of the following most likely describes why a security engineer would configure all outbound emails to use S/MIME digital signatures?", "options": [{"letter": "A", "text": "To meet compliance standards"}, {"letter": "B", "text": "To increase delivery rates"}, {"letter": "C", "text": "To block phishing attacks"}, {"letter": "D", "text": "To ensure non-repudiation"}], "answer": ["D"]}, {"id": "part1-247", "number": 247, "excelRow": 248, "type": "single", "question": "During a recent company safety stand-down, the cyber-awareness team gave a presentation on the importance of cyber hygiene. One topic the team covered was best practices for printing centers. Which of the following describes an attack method that relates to printing centers?", "options": [{"letter": "A", "text": "Whaling"}, {"letter": "B", "text": "Credential harvesting"}, {"letter": "C", "text": "Prepending"}, {"letter": "D", "text": "Dumpster diving"}], "answer": ["D"]}, {"id": "part1-248", "number": 248, "excelRow": 249, "type": "single", "question": "Which of the following considerations is the most important regarding cryptography used in an IoT device?", "options": [{"letter": "A", "text": "Resource constraints"}, {"letter": "B", "text": "Available bandwidth"}, {"letter": "C", "text": "The use of block ciphers"}, {"letter": "D", "text": "The compatibility of the TLS version"}], "answer": ["A"]}, {"id": "part1-249", "number": 249, "excelRow": 250, "type": "single", "question": "A coffee shop owner wants to restrict internet access to only paying customers by prompting them for a receipt number. Which of the following is the best method to use given this requirement?", "options": [{"letter": "A", "text": "WPA3"}, {"letter": "B", "text": "Captive portal"}, {"letter": "C", "text": "PSK"}, {"letter": "D", "text": "IEEE 802.1X"}], "answer": ["B"]}, {"id": "part1-250", "number": 250, "excelRow": 251, "type": "single", "question": "While performing digital forensics, which of the following is considered the most volatile and should have the contents collected first?", "options": [{"letter": "A", "text": "Hard drive"}, {"letter": "B", "text": "RAM"}, {"letter": "C", "text": "SSD"}, {"letter": "D", "text": "Temporary files"}], "answer": ["B"]}, {"id": "part1-251", "number": 251, "excelRow": 252, "type": "single", "question": "A hosting provider needs to prove that its security controls have been in place over the last six months and have sufficiently protected customer data. Which of the following would provide the best proof that the hosting provider has met the requirements?", "options": [{"letter": "A", "text": "NIST CSF"}, {"letter": "B", "text": "SOC 2 Type 2 report"}, {"letter": "C", "text": "CIS Top 20 compliance reports"}, {"letter": "D", "text": "Vulnerability report"}], "answer": ["B"]}, {"id": "part1-252", "number": 252, "excelRow": 253, "type": "single", "question": "A city municipality lost its primary data center when a tornado hit the facility. Which of the following should the city staff use immediately after the disaster to handle essential public services?", "options": [{"letter": "A", "text": "BCP"}, {"letter": "B", "text": "Communication plan"}, {"letter": "C", "text": "DRP"}, {"letter": "D", "text": "IRP"}], "answer": ["C"]}, {"id": "part1-253", "number": 253, "excelRow": 254, "type": "single", "question": "Which of the following is considered a preventive control?", "options": [{"letter": "A", "text": "Configuration auditing"}, {"letter": "B", "text": "Log correlation"}, {"letter": "C", "text": "Incident alerts"}, {"letter": "D", "text": "Segregation of duties"}], "answer": ["D"]}, {"id": "part1-254", "number": 254, "excelRow": 255, "type": "single", "question": "A systems administrator notices that a testing system is down. While investigating, the systems administrator finds that the servers are online and accessible from any device on the server network. The administrator reviews the following information from the monitoring system:\n| Server name | IP | Traffic sent | Traffic received | Status |\n|---|---|---|---|---|\n| File01 | 10.12.14.13 | 2654812 | 23185 | Up |\n| DC01 | 10.12.15.2 | 168741 | 65481 | Up |\n| Test01 | 10.25.1.3 | 14872 | 654123168 | Down |\n| Test02 | 10.25.1.4 | 16941 | 651321685 | Down |\n| DC02 | 10.12.15.3 | 32145 | 32158 | Up |\n| Finance01 | 10.18.1.14 | 12374 | 6548 | Up |\nWhich of the following is the most likely cause of the outage?", "options": [{"letter": "A", "text": "Denial of service"}, {"letter": "B", "text": "ARP poisoning"}, {"letter": "C", "text": "Jamming"}, {"letter": "D", "text": "Kerberoasting"}], "answer": ["A"]}, {"id": "part1-255", "number": 255, "excelRow": 256, "type": "single", "question": "A security team has been alerted to a flood of incoming emails that have various subject lines and are addressed to multiple email inboxes. Each email contains a URL shortener link that redirecting to a dead domain. Which of the following is the best step for the security team to take?", "options": [{"letter": "A", "text": "Create a blocklist for all subject lines."}, {"letter": "B", "text": "Send the dead domain to a DNS sinkhole."}, {"letter": "C", "text": "Quarantine all emails received and notify all employees."}, {"letter": "D", "text": "Block the URL shortener domain in the web proxy."}], "answer": ["D"]}, {"id": "part1-256", "number": 256, "excelRow": 257, "type": "single", "question": "A security administrator is working to secure company data on corporate laptops in case the laptops are stolen. Which of the following solutions should the administrator consider?", "options": [{"letter": "A", "text": "Disk encryption"}, {"letter": "B", "text": "Data loss prevention"}, {"letter": "C", "text": "Operating system hardening"}, {"letter": "D", "text": "Boot security"}], "answer": ["A"]}, {"id": "part1-257", "number": 257, "excelRow": 258, "type": "single", "question": "A company needs to keep the fewest records possible, meet compliance needs, and ensure destruction of records that are no longer needed. Which of the following best describes the policy that meets these requirements?", "options": [{"letter": "A", "text": "Security policy"}, {"letter": "B", "text": "Classification policy"}, {"letter": "C", "text": "Retention policy"}, {"letter": "D", "text": "Access control policy"}], "answer": ["C"]}, {"id": "part1-258", "number": 258, "excelRow": 259, "type": "single", "question": "Which of the following is a common source of unintentional corporate credential leakage in cloud environments?", "options": [{"letter": "A", "text": "Code repositories"}, {"letter": "B", "text": "Dark web"}, {"letter": "C", "text": "Threat feeds"}, {"letter": "D", "text": "State actors"}, {"letter": "E", "text": "Vulnerability databases"}], "answer": ["A"]}, {"id": "part1-259", "number": 259, "excelRow": 260, "type": "single", "question": "Which of the following is the best reason an organization should enforce a data classification policy to help protect its most sensitive information?", "options": [{"letter": "A", "text": "End users will be required to consider the classification of data that can be used in documents."}, {"letter": "B", "text": "The policy will result in the creation of access levels for each level of classification."}, {"letter": "C", "text": "The organization will have the ability to create security requirements based on classification levels."}, {"letter": "D", "text": "Security analysts will be able to see the classification of data within a document before opening it."}], "answer": ["C"]}, {"id": "part1-260", "number": 260, "excelRow": 261, "type": "single", "question": "An analyst is performing a vulnerability scan against the web servers exposed to the internet without a system account. Which of the following is most likely being performed?", "options": [{"letter": "A", "text": "Non-credentialed scan"}, {"letter": "B", "text": "Packet capture"}, {"letter": "C", "text": "Privilege escalation"}, {"letter": "D", "text": "System enumeration"}, {"letter": "E", "text": "Passive scan"}], "answer": ["A"]}, {"id": "part1-261", "number": 261, "excelRow": 262, "type": "single", "question": "A security administrator is hardening corporate systems and applying appropriate mitigations by consulting a real-world knowledge base for adversary behavior. Which of the following would be best for the administrator to reference?", "options": [{"letter": "A", "text": "MITRE ATT&CK"}, {"letter": "B", "text": "CSIRT"}, {"letter": "C", "text": "CVSS"}, {"letter": "D", "text": "SOAR"}], "answer": ["A"]}, {"id": "part1-262", "number": 262, "excelRow": 263, "type": "single", "question": "An architect has a request to increase the speed of data transfer using JSON requests externally. Currently, the organization uses SFTP to transfer data files. Which of the following will most likely meet the requirements?", "options": [{"letter": "A", "text": "A website-hosted solution"}, {"letter": "B", "text": "Cloud shared storage"}, {"letter": "C", "text": "A secure email solution"}, {"letter": "D", "text": "Microservices using API"}], "answer": ["D"]}, {"id": "part1-263", "number": 263, "excelRow": 264, "type": "single", "question": "Which of the following addresses individual rights such as the right to be informed, the right of access, and the right to be forgotten?", "options": [{"letter": "A", "text": "GDPR"}, {"letter": "B", "text": "PCI DSS"}, {"letter": "C", "text": "NIST"}, {"letter": "D", "text": "ISO"}], "answer": ["A"]}, {"id": "part1-264", "number": 264, "excelRow": 265, "type": "single", "question": "An administrator is installing an LDAP browser tool in order to view objects in the corporate LDAP directory. Secure connections to the LDAP server are required. When the browser connects to the server, certificate errors are being displayed, and then the connection is terminated. Which of the following is the most likely solution?", "options": [{"letter": "A", "text": "The administrator should allow SAN certificates in the browser configuration."}, {"letter": "B", "text": "The administrator needs to install the server certificate into the local truststore."}, {"letter": "C", "text": "The administrator should request that the secure LDAP port be opened to the server."}, {"letter": "D", "text": "The administrator needs to increase the TLS version on the organization’s RA."}], "answer": ["B"]}, {"id": "part1-265", "number": 265, "excelRow": 266, "type": "single", "question": "Which of the following is the most important security concern when using legacy systems to provide production service?", "options": [{"letter": "A", "text": "Instability"}, {"letter": "B", "text": "Lack of vendor support"}, {"letter": "C", "text": "Loss of availability"}, {"letter": "D", "text": "Use of insecure protocols"}], "answer": ["B"]}, {"id": "part1-266", "number": 266, "excelRow": 267, "type": "single", "question": "A security investigation revealed that malicious software was installed on a server using a server administrator’s credentials. During the investigation, the server administrator explained that Telnet was regularly used to log in. Which of the following most likely occurred?", "options": [{"letter": "A", "text": "A spraying attack was used to determine which credentials to use."}, {"letter": "B", "text": "A packet capture tool was used to steal the password."}, {"letter": "C", "text": "A remote-access Trojan was used to install the malware."}, {"letter": "D", "text": "A dictionary attack was used to log in as the server administrator."}], "answer": ["B"]}, {"id": "part1-267", "number": 267, "excelRow": 268, "type": "single", "question": "A user is requesting Telnet access to manage a remote development web server. Insecure protocols are not allowed for use within any environment. Which of the following should be configured to allow remote access to this server?", "options": [{"letter": "A", "text": "HTTPS"}, {"letter": "B", "text": "SNMPv3"}, {"letter": "C", "text": "SSH"}, {"letter": "D", "text": "RDP"}, {"letter": "E", "text": "SMTP"}], "answer": ["C"]}, {"id": "part1-268", "number": 268, "excelRow": 269, "type": "single", "question": "A security administrator is working to find a cost-effective solution to implement certificates for a large number of domains and subdomains owned by the company. Which of the following types of certificates should the administrator implement?", "options": [{"letter": "A", "text": "Wildcard"}, {"letter": "B", "text": "Client certificate"}, {"letter": "C", "text": "Self-signed"}, {"letter": "D", "text": "Code signing"}], "answer": ["A"]}, {"id": "part1-269", "number": 269, "excelRow": 270, "type": "single", "question": "An auditor discovered multiple insecure ports on some servers. Other servers were found to have legacy protocols enabled. Which of the following tools did the auditor use to discover these issues?", "options": [{"letter": "A", "text": "Nessus"}, {"letter": "B", "text": "curl"}, {"letter": "C", "text": "Wireshark"}, {"letter": "D", "text": "netcat"}], "answer": ["A"]}, {"id": "part1-270", "number": 270, "excelRow": 271, "type": "single", "question": "A security analyst received a tip that sensitive proprietary information was leaked to the public. The analyst is reviewing the PCAP and notices traffic between an internal server and an external host that includes the following:\n\n...\n12:47:22.327233 PPPoE [ses 0x812] IP (tos 0x0, tt 64, id 0, offset 0, flags [DF], proto IPv6 (41), length 331) 10.5.1.1 > 52.165.16.154: IP6 (hlim E3, next-header TCP (6) payload length: 271) 2001:67c:2158:a019:ace:53104 > 2001:0:5ef5:79fd:380c:dddda601:24fa.13788: Flags [P], cksum 0xd7ee (correct), seq 97:348, ack 102, win 16444, length 251\n...\n\nWhich of the following was most likely used to exfiltrate the data?", "options": [{"letter": "A", "text": "Encapsulation"}, {"letter": "B", "text": "MAC address spoofing"}, {"letter": "C", "text": "Steganography"}, {"letter": "D", "text": "Broken encryption"}, {"letter": "E", "text": "Sniffing via on-path position"}], "answer": ["A"]}, {"id": "part1-271", "number": 271, "excelRow": 272, "type": "single", "question": "A company wants to reduce the time and expense associated with code deployment. Which of the following technologies should the company utilize?", "options": [{"letter": "A", "text": "Serverless architecture"}, {"letter": "B", "text": "Thin clients"}, {"letter": "C", "text": "Private cloud"}, {"letter": "D", "text": "Virtual machines"}], "answer": ["A"]}, {"id": "part1-272", "number": 272, "excelRow": 273, "type": "single", "question": "A security administrator is performing an audit on a stand-alone UNIX server, and the following message is immediately displayed:\n\n(Error 13): /etc/shadow: Permission denied.\n\nWhich of the following best describes the type of tool that is being used?", "options": [{"letter": "A", "text": "Pass-the-hash monitor"}, {"letter": "B", "text": "File integrity monitor"}, {"letter": "C", "text": "Forensic analysis"}, {"letter": "D", "text": "Password cracker"}], "answer": ["D"]}, {"id": "part1-273", "number": 273, "excelRow": 274, "type": "single", "question": "A security administrator needs to create firewall rules for the following protocols: RTP, SIP, H.323. and SRTP. Which of the following does this rule set support?", "options": [{"letter": "A", "text": "RTOS"}, {"letter": "B", "text": "VoIP"}, {"letter": "C", "text": "SoC"}, {"letter": "D", "text": "HVAC"}], "answer": ["B"]}, {"id": "part1-274", "number": 274, "excelRow": 275, "type": "single", "question": "Which of the following best describes a social engineering attack that uses a targeted electronic messaging campaign aimed at a Chief Executive Officer?", "options": [{"letter": "A", "text": "Whaling"}, {"letter": "B", "text": "Spear phishing"}, {"letter": "C", "text": "Impersonation"}, {"letter": "D", "text": "Identity fraud"}], "answer": ["A"]}, {"id": "part1-275", "number": 275, "excelRow": 276, "type": "single", "question": "During a penetration test, a flaw in the internal PKI was exploited to gain domain administrator rights using specially crafted certificates. Which of the following remediation tasks should be completed as part of the cleanup phase?", "options": [{"letter": "A", "text": "Updating the CRL"}, {"letter": "B", "text": "Patching the CA"}, {"letter": "C", "text": "Changing passwords"}, {"letter": "D", "text": "Implementing SOAR"}], "answer": ["A"]}, {"id": "part1-276", "number": 276, "excelRow": 277, "type": "single", "question": "A company wants to implement MFA. Which of the following enables the additional factor while using a smart card?", "options": [{"letter": "A", "text": "PIN"}, {"letter": "B", "text": "Hardware token"}, {"letter": "C", "text": "User ID"}, {"letter": "D", "text": "SMS"}], "answer": ["A"]}, {"id": "part1-277", "number": 277, "excelRow": 278, "type": "single", "question": "A company hired an external consultant to assist with required system upgrades to a critical business application. A systems administrator needs to secure the consultant's access without sharing passwords to critical systems. Which of the following solutions should most likely be utilized?", "options": [{"letter": "A", "text": "TACACS+"}, {"letter": "B", "text": "SAML"}, {"letter": "C", "text": "An SSO platform"}, {"letter": "D", "text": "Role-based access control"}, {"letter": "E", "text": "PAM software"}], "answer": ["E"]}, {"id": "part1-278", "number": 278, "excelRow": 279, "type": "single", "question": "A newly implemented wireless network is designed so that visitors can connect to the wireless network for business activities. The legal department is concerned that visitors might connect to the network and perform illicit activities. Which of me following should the security team implement to address this concern?", "options": [{"letter": "A", "text": "Configure a RADIUS server to manage device authentication."}, {"letter": "B", "text": "Use 802.1X on all devices connecting to wireless."}, {"letter": "C", "text": "Add a guest captive portal requiring visitors to accept terms and conditions."}, {"letter": "D", "text": "Allow for new devices to be connected via WPS."}], "answer": ["C"]}, {"id": "part1-279", "number": 279, "excelRow": 280, "type": "single", "question": "Which of the following data roles is responsible for identifying risks and appropriate access to data?", "options": [{"letter": "A", "text": "Owner"}, {"letter": "B", "text": "Custodian"}, {"letter": "C", "text": "Steward"}, {"letter": "D", "text": "Controller"}], "answer": ["A"]}, {"id": "part1-280", "number": 280, "excelRow": 281, "type": "multiple", "question": "Which of the following physical controls can be used to both detect and deter? (Choose two.)", "options": [{"letter": "A", "text": "Lighting"}, {"letter": "B", "text": "Fencing"}, {"letter": "C", "text": "Signage"}, {"letter": "D", "text": "Sensor"}, {"letter": "E", "text": "Bollard"}, {"letter": "F", "text": "Lock"}], "answer": ["A", "D"]}, {"id": "part1-281", "number": 281, "excelRow": 282, "type": "single", "question": "A multinational bank hosts several servers in its data center. These servers run a business-critical application used by customers to access their account information. Which of the following should the bank use to ensure accessibility during peak usage times?", "options": [{"letter": "A", "text": "Load balancer"}, {"letter": "B", "text": "Cloud backups"}, {"letter": "C", "text": "Geographic dispersal"}, {"letter": "D", "text": "Disk multipathing"}], "answer": ["A"]}, {"id": "part1-282", "number": 282, "excelRow": 283, "type": "single", "question": "The author of a software package is concerned about bad actors repackaging and inserting malware into the software. The software download is hosted on a website, and the author exclusively controls the website's contents. Which of the following techniques would best ensure the software's integrity?", "options": [{"letter": "A", "text": "Input validation"}, {"letter": "B", "text": "Code signing"}, {"letter": "C", "text": "Secure cookies"}, {"letter": "D", "text": "Fuzzing"}], "answer": ["B"]}, {"id": "part1-283", "number": 283, "excelRow": 284, "type": "single", "question": "A third-party vendor is moving a particular application to the end-of-life stage at the end of the current year. Which of the following is the most critical risk if the company chooses to continue running the application?", "options": [{"letter": "A", "text": "Lack of security updates"}, {"letter": "B", "text": "Lack of new features"}, {"letter": "C", "text": "Lack of support"}, {"letter": "D", "text": "Lack of source code access"}], "answer": ["A"]}, {"id": "part1-284", "number": 284, "excelRow": 285, "type": "single", "question": "A security analyst recently read a report about a flaw in several of the organization's printer models that causes credentials to be sent over the network in cleartext, regardless of the encryption settings. Which of the following would be best to use to validate this finding?", "options": [{"letter": "A", "text": "Wireshark"}, {"letter": "B", "text": "netcat"}, {"letter": "C", "text": "Nessus"}, {"letter": "D", "text": "Nmap"}], "answer": ["A"]}, {"id": "part1-285", "number": 285, "excelRow": 286, "type": "single", "question": "A development team is launching a new public-facing web product. The Chief Information Security Officer has asked that the product be protected from attackers who use malformed or invalid inputs to destabilize the system. Which of the following practices should the development team implement?", "options": [{"letter": "A", "text": "Fuzzing"}, {"letter": "B", "text": "Continuous deployment"}, {"letter": "C", "text": "Static code analysis"}, {"letter": "D", "text": "Manual peer review"}], "answer": ["A"]}, {"id": "part1-286", "number": 286, "excelRow": 287, "type": "single", "question": "During an annual review of the system design, an engineer identified a few issues with the currently released design. Which of the following shoul cement of content filtering policies"}, {"letter": "F", "text": "A review of user account permissions"}], "answer": ["B", "D"]}, {"id": "part1-292", "number": 292, "excelRow": 293, "type": "multiple", "question": "A security team is addressing a risk associated with the attack surface of the organization's web application over port 443. Currently, no advanced network security capabilities are in place. Which of the following would be best to set up? (Choose two.)", "options": [{"letter": "A", "text": "NIDS"}, {"letter": "B", "text": "Honeypot"}, {"letter": "C", "text": "Certificate revocation list"}, {"letter": "D", "text": "HIPS"}, {"letter": "E", "text": "WAF"}, {"letter": "F", "text": "SIEM"}], "answer": ["A", "E"]}, {"id": "part1-293", "number": 293, "excelRow": 294, "type": "single", "question": "A systems administrator would like to create a point-in-time backup of a virtual machine. Which of the following should the administrator use?", "options": [{"letter": "A", "text": "Replication"}, {"letter": "B", "text": "Simulation"}, {"letter": "C", "text": "Snapshot"}, {"letter": "D", "text": "Containerization"}], "answer": ["C"]}, {"id": "part1-294", "number": 294, "excelRow": 295, "type": "single", "question": "A security administrator notices numerous unused, non-compliant desktops are connected to the network. Which of the following actions would the administrator most likely recommend to the management team?", "options": [{"letter": "A", "text": "Monitoring"}, {"letter": "B", "text": "Decommissioning"}, {"letter": "C", "text": "Patching"}, {"letter": "D", "text": "Isolating"}], "answer": ["B"]}, {"id": "part1-295", "number": 295, "excelRow": 296, "type": "single", "question": "Which of the following is a common data removal option for companies that want to wipe sensitive data from hard drives in a repeatable manner but allow the hard drives to be reused?", "options": [{"letter": "A", "text": "Sanitization"}, {"letter": "B", "text": "Formatting"}, {"letter": "C", "text": "Degaussing"}, {"letter": "D", "text": "Defragmentation"}], "answer": ["A"]}, {"id": "part1-296", "number": 296, "excelRow": 297, "type": "single", "question": "An organization wants to improve the company's security authentication method for remote employees. Given the following requirements:\n• Must work across SaaS and internal network applications\n• Must be device manufacturer agnostic\n• Must have offline capabilities\nWhich of the following would be the most appropriate authentication method?", "options": [{"letter": "A", "text": "Username and password"}, {"letter": "B", "text": "Biometrics"}, {"letter": "C", "text": "SMS verification"}, {"letter": "D", "text": "Time-based tokens"}], "answer": ["D"]}, {"id": "part1-297", "number": 297, "excelRow": 298, "type": "single", "question": "A security officer is implementing a security awareness program and has placed security-themed posters around the building and assigned online user training. Which of the following will the security officer most likely implement?", "options": [{"letter": "A", "text": "Password policy"}, {"letter": "B", "text": "Access badges"}, {"letter": "C", "text": "Phishing campaign"}, {"letter": "D", "text": "Risk assessment"}], "answer": ["C"]}, {"id": "part1-298", "number": 298, "excelRow": 299, "type": "single", "question": "A malicious update was distributed to a common software platform and disabled services at many organizations. Which of the following best describes this type of vulnerability?", "options": [{"letter": "A", "text": "DDoS attack"}, {"letter": "B", "text": "Rogue employee"}, {"letter": "C", "text": "Insider threat"}, {"letter": "D", "text": "Supply chain"}], "answer": ["D"]}, {"id": "part1-299", "number": 299, "excelRow": 300, "type": "single", "question": "A company web server is initiating outbound traffic to a low-reputation, public IP on non-standard pat. The web server is used to present an unauthenticated page to clients who upload images the company. An iency in the event of a primary power failure?", "options": [{"letter": "A", "text": "Parallel processing"}, {"letter": "B", "text": "Tabletop exercise"}, {"letter": "C", "text": "Simulation testing"}, {"letter": "D", "text": "Production failover"}], "answer": ["D"]}, {"id": "part1-312", "number": 312, "excelRow": 313, "type": "single", "question": "Which of the following would be the most appropriate way to protect data in transit?", "options": [{"letter": "A", "text": "SHA-256"}, {"letter": "B", "text": "SSL3.0"}, {"letter": "C", "text": "TLS 1.3"}, {"letter": "D", "text": "AES-256"}], "answer": ["C"]}, {"id": "part1-313", "number": 313, "excelRow": 314, "type": "single", "question": "Which of the following is a common, passive reconnaissance technique employed by penetration testers in the early phases of an engagement?", "options": [{"letter": "A", "text": "Open-source intelligence"}, {"letter": "B", "text": "Port scanning"}, {"letter": "C", "text": "Pivoting"}, {"letter": "D", "text": "Exploit validation"}], "answer": ["A"]}, {"id": "part1-314", "number": 314, "excelRow": 315, "type": "single", "question": "Which of the following threat actors is the most likely to seek financial gain through the use of ransomware attacks?", "options": [{"letter": "A", "text": "Organized crime"}, {"letter": "B", "text": "Insider threat"}, {"letter": "C", "text": "Nation-state"}, {"letter": "D", "text": "Hacktivists"}], "answer": ["A"]}, {"id": "part1-315", "number": 315, "excelRow": 316, "type": "single", "question": "Which of the following would a systems administrator follow when upgrading the firmware of an organization's router?", "options": [{"letter": "A", "text": "Software development life cycle"}, {"letter": "B", "text": "Risk tolerance"}, {"letter": "C", "text": "Certificate signing request"}, {"letter": "D", "text": "Maintenance window"}], "answer": ["D"]}, {"id": "part1-316", "number": 316, "excelRow": 317, "type": "single", "question": "The security team has been as tions with limited computing resources?", "options": [{"letter": "A", "text": "Hashing algorithm"}, {"letter": "B", "text": "Public key infrastructure"}, {"letter": "C", "text": "Symmetric encryption"}, {"letter": "D", "text": "Elliptic curve cryptography"}], "answer": ["C"]}, {"id": "part2-36", "number": 36, "excelRow": 37, "type": "single", "question": "A network administrator wants to ensure that network traffic is highly secure while in transit.\nWhich of the following actions best describes the actions the network administrator should take?", "options": [{"letter": "A", "text": "Ensure that NAC is enforced on all network segments, and confirm that firewalls have updated policies to block unauthorized traffic."}, {"letter": "B", "text": "Ensure only TLS and other encrypted protocols are selected for use on the network, and only permit authorized traffic via secure protocols."}, {"letter": "C", "text": "Configure the perimeter IPS to block inbound HTTPS directory traversal traffic, and verify that signatures are updated on a daily basis."}, {"letter": "D", "text": "Ensure the EDR software monitors for unauthorized applications that could be used by threat actors, and configure alerts for the security team."}], "answer": ["B"]}, {"id": "part2-37", "number": 37, "excelRow": 38, "type": "single", "question": "Which of the following definitions best describes the concept of log correlation?", "options": [{"letter": "A", "text": "Combining relevant logs from multiple sources into one location"}, {"letter": "B", "text": "Searching and processing data to identify patterns of malicious activity"}, {"letter": "C", "text": "Making a record of the events that occur in the system"}, {"letter": "D", "text": "Analyzing the log files of the system components"}], "answer": ["B"]}, {"id": "part2-38", "number": 38, "excelRow": 39, "type": "single", "question": "An enterprise security team is researching a new security architecture to better protect the company's networks and appli ports will best achieve the objective?", "options": [{"letter": "A", "text": "Red teaming"}, {"letter": "B", "text": "Penetration testing"}, {"letter": "C", "text": "Independent audit"}, {"letter": "D", "text": "Vulnerability assessment"}], "answer": ["C"]}, {"id": "part2-43", "number": 43, "excelRow": 44, "type": "single", "question": "A systems administrator successfully configures VPN access to a cloud environment. Which of the following capabilities should the administrator use to best facilitate remote administration?", "options": [{"letter": "A", "text": "A jump host in the shared services security zone"}, {"letter": "B", "text": "An SSH server within the corporate LAN"}, {"letter": "C", "text": "A reverse proxy on the firewall"}, {"letter": "D", "text": "An MDM solution with conditional access"}], "answer": ["A"]}, {"id": "part2-44", "number": 44, "excelRow": 45, "type": "single", "question": "Which of the following best describes the concept of information being stored outside of its country of origin while still being subject to the laws and requirements of the country of origin?", "options": [{"letter": "A", "text": "Data sovereignty"}, {"letter": "B", "text": "Geolocation"}, {"letter": "C", "text": "Intellectual property"}, {"letter": "D", "text": "Geographic restrictions"}], "answer": ["A"]}, {"id": "part2-45", "number": 45, "excelRow": 46, "type": "single", "question": "An audit reveals that cardholder database logs are exposing account numbers inappropriately. Which of the following mechanisms would help limit the impact of this error?", "options": [{"letter": "A", "text": "Segmentation"}, {"letter": "B", "text": "Hashing"}, {"letter": "C", "text": "Journaling"}, {"letter": "D", "text": "Masking"}], "answer": ["D"]}, {"id": "part2-46", "number": 46, "excelRow": 47, "type": "single", "question": "A security analyst attempts to start a company's database server. When the server starts, the analyst receives an error message indicating the database server ter": "A", "text": "Firewall"}, {"letter": "B", "text": "IDS"}, {"letter": "C", "text": "Honeypot"}, {"letter": "D", "text": "Layer 3 switch"}], "answer": ["C"]}, {"id": "part2-55", "number": 55, "excelRow": 56, "type": "single", "question": "Which of the following objectives is best achieved by a tabletop exercise?", "options": [{"letter": "A", "text": "Familiarizing participants with the incident response process"}, {"letter": "B", "text": "Deciding red and blue team rules of engagement"}, {"letter": "C", "text": "Quickly determining the impact of an actual security breach"}, {"letter": "D", "text": "Conducting multiple security investigations in parallel"}], "answer": ["A"]}, {"id": "part2-56", "number": 56, "excelRow": 57, "type": "single", "question": "The private key for a website was stolen, and a new certificate has been issued. Which of the following needs to be updated next?", "options": [{"letter": "A", "text": "SCEP"}, {"letter": "B", "text": "CRL"}, {"letter": "C", "text": "OCSP"}, {"letter": "D", "text": "CSR"}], "answer": ["B"]}, {"id": "part2-57", "number": 57, "excelRow": 58, "type": "single", "question": "Which of the following organizational documents is most often used to establish and communicate expectations associated with integrity and ethical behavior within an organization?", "options": [{"letter": "A", "text": "AUP"}, {"letter": "B", "text": "SLA"}, {"letter": "C", "text": "EULA"}, {"letter": "D", "text": "MOA"}], "answer": ["A"]}, {"id": "part2-58", "number": 58, "excelRow": 59, "type": "single", "question": "Which of the following explains how to determine the global regulations that data is subject to regardless of the country where the data is stored?", "options": [{"letter": "A", "text": "Geographic dispersion"}, {"letter": "B", "text": "Data sovereignty"}, {"letter": "C", "text": "Geographic restrictions"}, {"letter": "D", "text": "Data segmentation"}], "answer": ["B"]}, {"id": "part2-59", "number": 59, "excelRow": 60, "type": "multiple", "question": "An organization's web servers host an online ordering system. The organization discovers that the servers are vulnerable to a malicious JavaScript injection, which could allow attackers to access customer payment information. Which of the following mitigation strategies would be most effective for preventing an attack on the organization's web servers? (Choose two.)", "options": [{"letter": "A", "text": "Regularly updating server software and patches"}, {"letter": "B", "text": "Implementing strong password policies"}, {"letter": "C", "text": "Encrypting sensitive data at rest and in transit"}, {"letter": "D", "text": "Utilizing a web-application firewall"}, {"letter": "E", "text": "Performing regular vulnerability scans"}, {"letter": "F", "text": "Removing payment information from the servers"}], "answer": ["A", "D"]}, {"id": "part2-60", "number": 60, "excelRow": 61, "type": "single", "question": "Which of the following tools is best for logging and monitoring in a cloud environment?", "options": [{"letter": "A", "text": "IPS"}, {"letter": "B", "text": "FIM"}, {"letter": "C", "text": "NAC"}, {"letter": "D", "text": "SIEM"}], "answer": ["D"]}, {"id": "part2-61", "number": 61, "excelRow": 62, "type": "single", "question": "During a SQL update of a database, a temporary field that was created was replaced by an attacker in order to allow access to the system. Which of the following best describes this type of vulnerability?", "options": [{"letter": "A", "text": "Race condition"}, {"letter": "B", "text": "Memory injection"}, {"letter": "C", "text": "Malicious update"}, {"letter": "D", "text": "Side loading"}], "answer": ["C"]}, {"id": "part2-62", "number": 62, "excelRow": 63, "type": "single", "question": "A group of developers has a shared backup account to access the source code repository. Which of the following is the best way to secure the backup account if there is an SSO failure?", "options": [{"letter": "A", "text": "RAS"}, {"letter": "B", "text": "EAP"}, {"letter": "C", "text": "SAML"}, {"letter": "D", "text": "PAM"}], "answer": ["D"]}, {"id": "part2-63", "number": 63, "excelRow": 64, "type": "single", "question": "Which of the following elements of digital forensics should a company use if it needs to ensure the integrity of evidence?", "options": [{"letter": "A", "text": "Preservation"}, {"letter": "B", "text": "E-discovery"}, {"letter": "C", "text": "Acquisition"}, {"letter": "D", "text": "Containment"}], "answer": ["A"]}, {"id": "part2-64", "number": 64, "excelRow": 65, "type": "single", "question": "A company suffered a critical incident where 30GB of data was exfiltrated from the corporate network. Which of the following actions is the most efficient way to identify where the system data was exfiltrated from and what location the attacker sent the data to?", "options": [{"letter": "A", "text": "Analyze firewall and network logs for large amounts of outbound traffic to external IP addresses or domains."}, {"letter": "B", "text": "Analyze IPS and IDS logs to find the IP addresses used by the attacker for reconnaissance scans."}, {"letter": "C", "text": "Analyze endpoint and application logs to see whether file-sharing programs were running on the company systems."}, {"letter": "D", "text": "Analyze external vulnerability scans and automated reports to identify the systems the attacker could have exploited a remote code vulnerability."}], "answer": ["A"]}, {"id": "part2-65", "number": 65, "excelRow": 66, "type": "single", "question": "Which of the following describes the procedures a penetration tester must follow while conducting a test?", "options": [{"letter": "A", "text": "Rules of engagement"}, {"letter": "B", "text": "Rules of acceptance"}, {"letter": "C", "text": "Rules of understanding"}, {"letter": "D", "text": "Rules of execution"}], "answer": ["A"]}, {"id": "part2-66", "number": 66, "excelRow": 67, "type": "single", "question": "A security analyst wants to better understand the behavior of nitor the email feed."}, {"letter": "C", "text": "Scan email traffic inline."}, {"letter": "D", "text": "Check SPF records."}], "answer": ["C"]}, {"id": "part2-71", "number": 71, "excelRow": 72, "type": "single", "question": "Which of the following activities is the first stage in the incident response process?", "options": [{"letter": "A", "text": "Detection"}, {"letter": "B", "text": "Declaration"}, {"letter": "C", "text": "Containment"}, {"letter": "D", "text": "Verification"}], "answer": ["A"]}, {"id": "part2-72", "number": 72, "excelRow": 73, "type": "single", "question": "Which of the following is the main consideration when a legacy system that is a critical part of a company's infrastructure cannot be replaced?", "options": [{"letter": "A", "text": "Resource provisioning"}, {"letter": "B", "text": "Cost"}, {"letter": "C", "text": "Single point of failure"}, {"letter": "D", "text": "Complexity"}], "answer": ["C"]}, {"id": "part2-73", "number": 73, "excelRow": 74, "type": "single", "question": "Which of the following is a compensating control for providing user access to a high-risk website?", "options": [{"letter": "A", "text": "Enabling threat prevention features on the firewall"}, {"letter": "B", "text": "Configuring a SIEM tool to capture all web traffic"}, {"letter": "C", "text": "Setting firewall rules to allow traffic from any port to that destination"}, {"letter": "D", "text": "Blocking that website on the endpoint protection software"}], "answer": ["A"]}, {"id": "part2-74", "number": 74, "excelRow": 75, "type": "multiple", "question": "An organization is implementing a COPE mobile device management policy. Which of the following should the organization include in the COPE policy? (Choose two.)", "options": [{"letter": "A", "text": "Remote wiping of the device"}, {"letter": "B", "text": "Data encryption"}, {"letter": "C", "text": "Requiring passwords with eight characters"}, {"letter": "D", "text": "Data usage caps"}, {"letter": "E", "text": "Employee cation during runtime?", "options": [{"letter": "A", "text": "Dynamic analysis"}, {"letter": "B", "text": "Code review"}, {"letter": "C", "text": "Package monitoring"}, {"letter": "D", "text": "Bug bounty"}], "answer": ["A"]}, {"id": "part2-152", "number": 152, "excelRow": 153, "type": "single", "question": "Which of the following cryptographic solutions is used to hide the fact that communication is occurring?", "options": [{"letter": "A", "text": "Steganography"}, {"letter": "B", "text": "Data masking"}, {"letter": "C", "text": "Tokenization"}, {"letter": "D", "text": "Private key"}], "answer": ["A"]}, {"id": "part2-153", "number": 153, "excelRow": 154, "type": "single", "question": "Which of the following steps should be taken before mitigating a vulnerability in a production server?", "options": [{"letter": "A", "text": "Escalate the issue to the SDLC team."}, {"letter": "B", "text": "Use the IR plan to evaluate the changes."}, {"letter": "C", "text": "Perform a risk assessment to classify the vulnerability."}, {"letter": "D", "text": "Refer to the change management policy."}], "answer": ["D"]}, {"id": "part2-154", "number": 154, "excelRow": 155, "type": "single", "question": "A security engineer needs to quickly identify a signature from a known malicious file. Which of the following analysis methods would the security engineer most likely use?", "options": [{"letter": "A", "text": "Static"}, {"letter": "B", "text": "Sandbox"}, {"letter": "C", "text": "Network traffic"}, {"letter": "D", "text": "Package monitoring"}], "answer": ["A"]}, {"id": "part2-155", "number": 155, "excelRow": 156, "type": "single", "question": "Which of the following should a company use to provide proof of external network security testing?", "options": [{"letter": "A", "text": "Business impact analysis"}, {"letter": "B", "text": "Supply chain analysis"}, {"letter": "C", "text": "Vulnerability assessment"}, {"letter": "D", "text": "Third-party attestation"}], "answer": ["D"]}, {"id": "pa  172, "excelRow": 173, "type": "single", "question": "Which of the following is the act of proving to a customer that software developers are trained on secure coding?", "options": [{"letter": "A", "text": "Assurance"}, {"letter": "B", "text": "Contract"}, {"letter": "C", "text": "Due diligence"}, {"letter": "D", "text": "Attestation"}], "answer": ["B"]}, {"id": "part2-173", "number": 173, "excelRow": 174, "type": "single", "question": "An administrator is creating a secure method for a contractor to access a test environment. Which of the following would provide the contractor with the best access to the test environment?", "options": [{"letter": "A", "text": "Application server"}, {"letter": "B", "text": "Jump server"}, {"letter": "C", "text": "RDP server"}, {"letter": "D", "text": "Proxy server"}], "answer": ["B"]}, {"id": "part2-174", "number": 174, "excelRow": 175, "type": "single", "question": "A security analyst notices unusual behavior on the network. The IDS on the network was not able to detect the activities. Which of the following should the security analyst use to help the IDS detect such attacks in the future?", "options": [{"letter": "A", "text": "Signatures"}, {"letter": "B", "text": "Trends"}, {"letter": "C", "text": "Honeypot"}, {"letter": "D", "text": "Reputation"}], "answer": ["A"]}, {"id": "part2-175", "number": 175, "excelRow": 176, "type": "single", "question": "To which of the following security categories does an EDR solution belong?", "options": [{"letter": "A", "text": "Physical"}, {"letter": "B", "text": "Operational"}, {"letter": "C", "text": "Managerial"}, {"letter": "D", "text": "Technical"}], "answer": ["D"]}, {"id": "part2-176", "number": 176, "excelRow": 177, "type": "single", "question": "A company relies on open-source software libraries to build the software used by its customers. Which of the following vulnerability types would be the most difficult to remediate due to the company’s reliance on open-source libraries?", "options"
