<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Study workflow</title>
  <desc id="desc">A visual workflow showing choose a part, answer a block, grade, and review.</desc>
  <rect width="1200" height="360" fill="#242424"/>
  <text x="600" y="58" text-anchor="middle" fill="#f5f7f4" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900">Study Flow</text>
  <text x="600" y="88" text-anchor="middle" fill="#b8beb7" font-family="Inter, Arial, sans-serif" font-size="17">A simple loop for focused Security+ practice sessions.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="90" y="145" width="220" height="120" rx="14" fill="#2b2b2b" stroke="#4a4a4a" stroke-width="2"/>
    <text x="200" y="190" text-anchor="middle" fill="#8cff66" font-size="20" font-weight="900">1. Choose</text>
    <text x="200" y="222" text-anchor="middle" fill="#f5f7f4" font-size="16">Select Part 1 or Part 2</text>
    <rect x="355" y="145" width="220" height="120" rx="14" fill="#2b2b2b" stroke="#4a4a4a" stroke-width="2"/>
    <text x="465" y="190" text-anchor="middle" fill="#8cff66" font-size="20" font-weight="900">2. Practice</text>
    <text x="465" y="222" text-anchor="middle" fill="#f5f7f4" font-size="16">Answer a focused block</text>
    <rect x="620" y="145" width="220" height="120" rx="14" fill="#2b2b2b" stroke="#4a4a4a" stroke-width="2"/>
    <text x="730" y="190" text-anchor="middle" fill="#8cff66" font-size="20" font-weight="900">3. Grade</text>
    <text x="730" y="222" text-anchor="middle" fill="#f5f7f4" font-size="16">Check your results</text>
    <rect x="885" y="145" width="220" height="120" rx="14" fill="#2b2b2b" stroke="#4a4a4a" stroke-width="2"/>
    <text x="995" y="190" text-anchor="middle" fill="#8cff66" font-size="20" font-weight="900">4. Review</text>
    <text x="995" y="222" text-anchor="middle" fill="#f5f7f4" font-size="16">Learn from missed items</text>
    <path d="M318 205H347" stroke="#8cff66" stroke-width="4" stroke-linecap="round"/>
    <path d="M583 205H612" stroke="#8cff66" stroke-width="4" stroke-linecap="round"/>
    <path d="M848 205H877" stroke="#8cff66" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
